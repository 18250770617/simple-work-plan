<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>日程任务工具</title>
  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f0f2f5;
      color: #333;
      padding: 20px;
      min-height: 100vh;
    }
    #app {
      max-width: 560px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .card {
      background: #fff;
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
    }
    .header {
      text-align: center;
      margin-bottom: 24px;
    }
    .header h1 { font-size: 26px; font-weight: 700; color: #1a1a1a; }
    .header .sub { font-size: 13px; color: #aaa; margin-top: 4px; }

    /* ── 表单 ── */
    .add-form { margin-bottom: 20px; }
    .input {
      width: 100%;
      padding: 10px 14px;
      border: 2px solid #e8e8e8;
      border-radius: 10px;
      font-size: 15px;
      outline: none;
      transition: 0.2s;
    }
    .input:focus { border-color: #4f9cf7; }
    .input-title { margin-bottom: 8px; }
    .add-row { display: flex; gap: 8px; }
    .add-row .input { flex: 1; }

    .btn {
      padding: 10px 20px;
      border: none;
      border-radius: 10px;
      font-size: 14px;
      cursor: pointer;
      white-space: nowrap;
      transition: 0.2s;
    }
    .btn-primary { background: #4f9cf7; color: #fff; }
    .btn-primary:hover { background: #3a8af0; }
    .btn-sm {
      padding: 6px 10px;
      font-size: 13px;
      background: #f0f0f0;
      border-radius: 8px;
    }
    .btn-sm:hover { background: #e0e0e0; }
    .btn-sm.danger:hover { background: #ffe2e2; }
    .btn-archive {
      background: #e8f5e9;
      color: #2e7d32;
    }
    .btn-archive:hover { background: #c8e6c9; }
    .btn-outline {
      background: transparent;
      color: #666;
      border: 1px solid #ddd;
    }
    .btn-outline:hover { background: #f5f5f5; }

    /* ── 筛选栏 ── */
    .toolbar {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 6px;
      padding-bottom: 10px;
      border-bottom: 1px solid #f0f0f0;
      margin-bottom: 10px;
    }
    .filter-group {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
    }
    .filter-btn {
      padding: 4px 12px;
      border: 1px solid #e0e0e0;
      border-radius: 14px;
      background: #fafafa;
      font-size: 13px;
      cursor: pointer;
      transition: 0.2s;
      color: #666;
    }
    .filter-btn:hover { border-color: #4f9cf7; color: #4f9cf7; }
    .filter-btn.active {
      background: #4f9cf7;
      color: #fff;
      border-color: #4f9cf7;
    }
    .filter-date-input {
      width: 140px;
      padding: 4px 8px;
      border: 1px solid #e0e0e0;
      border-radius: 14px;
      font-size: 13px;
      outline: none;
    }
    .filter-date-input:focus { border-color: #4f9cf7; }
    .toolbar-stats {
      margin-left: auto;
      font-size: 13px;
      color: #999;
      white-space: nowrap;
    }

    /* ── 任务列表 ── */
    .task-list { display: flex; flex-direction: column; gap: 8px; }
    .task-item {
      border-radius: 12px;
      background: #f8f9fb;
      padding: 12px 14px;
    }
    .task-item:hover { background: #f0f2f5; }
    .task-item.done { opacity: 0.55; }
    .task-item.editing {
      background: #eef6ff;
      border: 1px solid #4f9cf7;
    }

    .view-area { display: flex; align-items: center; gap: 10px; }
    .cb-wrap { cursor: pointer; flex-shrink: 0; }
    .cb {
      display: inline-flex;
      width: 22px; height: 22px;
      border: 2px solid #ccc;
      border-radius: 6px;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      color: #fff;
      transition: 0.2s;
    }
    .cb.checked { background: #4f9cf7; border-color: #4f9cf7; }

    .task-body { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 2px; }
    .task-title { font-size: 15px; color: #1a1a1a; word-break: break-word; }
    .task-title.done { text-decoration: line-through; color: #bbb; }
    .task-time { font-size: 12px; color: #888; display: flex; align-items: center; gap: 4px; }
    .task-time.overdue { color: #e85151; }

    .task-actions { display: flex; gap: 4px; flex-shrink: 0; align-items: center; }

    /* 编辑区 */
    .edit-area { display: flex; flex-direction: column; gap: 8px; }
    .edit-actions { display: flex; gap: 6px; }

    /* 空状态 */
    .empty { text-align: center; padding: 48px 0; color: #ccc; font-size: 16px; }
    .empty-hint { margin-top: 8px; font-size: 13px; color: #ddd; }
    .empty-filter {
      text-align: center; padding: 32px 0; color: #ccc; font-size: 14px;
    }

    /* ── 存档记录 ── */
    .archive-card { padding: 16px 24px; }
    .archive-header {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      user-select: none;
    }
    .archive-header .arrow {
      font-size: 12px;
      transition: transform 0.2s;
      color: #999;
    }
    .archive-header .arrow.open { transform: rotate(90deg); }
    .archive-header h3 { font-size: 15px; font-weight: 600; color: #555; }
    .archive-header .count { font-size: 12px; color: #aaa; font-weight: 400; }
    .archive-header .clear-btn {
      margin-left: auto;
      font-size: 12px;
      color: #e85151;
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px 8px;
      border-radius: 6px;
    }
    .archive-header .clear-btn:hover { background: #fff0f0; }

    .archive-list {
      margin-top: 12px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .archive-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 10px;
      background: #fafafa;
      border-radius: 8px;
      font-size: 13px;
    }
    .archive-item .arch-title { flex: 1; color: #888; }
    .archive-item .arch-title.done { text-decoration: line-through; }
    .archive-item .arch-time { font-size: 11px; color: #bbb; }
    .archive-item .restore-btn {
      font-size: 12px;
      color: #4f9cf7;
      background: none;
      border: none;
      cursor: pointer;
      padding: 2px 6px;
      border-radius: 4px;
    }
    .archive-item .restore-btn:hover { background: #eef6ff; }

    @media (max-width: 480px) {
      body { padding: 12px; }
      .card { padding: 16px; }
      .filter-btn { font-size: 12px; padding: 3px 10px; }
      .toolbar-stats { font-size: 12px; }
    }
  </style>
</head>
<body>
  <div id="app">
    <!-- ====== 主卡片 ====== -->
    <div class="card">
      <div class="header">
        <h1>📋 日程任务</h1>
        <div class="sub">记录与提醒</div>
      </div>

      <!-- 添加 -->
      <div class="add-form">
        <input v-model="newTitle" class="input input-title"
          placeholder="写点什么..." @keyup.enter="addTask">
        <div class="add-row">
          <input v-model="newTime" type="datetime-local" class="input">
          <button class="btn btn-primary" @click="addTask">添加</button>
        </div>
      </div>

      <!-- 筛选 + 统计 -->
      <div class="toolbar">
        <div class="filter-group">
          <button class="filter-btn" :class="{ active: filterMode === 'all' }"
            @click="filterMode = 'all'">全部</button>
          <button class="filter-btn" :class="{ active: filterMode === 'today' }"
            @click="setFilterToday">今天</button>
          <button class="filter-btn" :class="{ active: filterMode === 'date' }"
            @click="pickDateFilter">指定日期</button>
          <button class="filter-btn" :class="{ active: filterMode === 'nodate' }"
            @click="filterMode = 'nodate'">无日期</button>
        </div>
        <input v-if="filterMode === 'date'" v-model="filterDate"
          type="date" class="filter-date-input" @change="applyFilterDate">
        <span class="toolbar-stats">
          共 <strong>{{ filteredTasks.length }}</strong> 项 ·
          未完成 <strong>{{ undoneFiltered }}</strong> 项
        </span>
      </div>

      <!-- 任务列表 -->
      <div class="task-list" v-if="filteredTasks.length">
        <div v-for="task in filteredTasks" :key="task.id"
          class="task-item"
          :class="{ done: task.done, editing: editingId === task.id }">

          <!-- 编辑模式 -->
          <div v-if="editingId === task.id" class="edit-area">
            <input v-model="editTitle" class="input" @keyup.enter="saveEdit">
            <input v-model="editTime" type="datetime-local" class="input">
            <div class="edit-actions">
              <button class="btn btn-primary btn-sm" @click="saveEdit">保存</button>
              <button class="btn btn-sm" @click="cancelEdit">取消</button>
            </div>
          </div>

          <!-- 展示模式 -->
          <div v-else class="view-area">
            <span class="cb-wrap" @click="toggleDone(task.id)">
              <span class="cb" :class="{ checked: task.done }">
                <span v-if="task.done">✓</span>
              </span>
            </span>
            <div class="task-body">
              <span class="task-title" :class="{ done: task.done }">{{ task.title }}</span>
              <span v-if="task.time" class="task-time"
                :class="{ overdue: !task.done && isOverdue(task.time) }">
                🕐 {{ formatTime(task.time) }}
                <template v-if="!task.done && isOverdue(task.time)">（已过期）</template>
              </span>
            </div>
            <div class="task-actions">
              <button v-if="task.done" class="btn btn-archive btn-sm"
                title="存入记录" @click="archiveTask(task.id)">📥 存档</button>
              <button class="btn btn-sm" @click="startEdit(task)">✏️</button>
              <button class="btn btn-sm danger" @click="deleteTask(task.id)">🗑️</button>
            </div>
          </div>

        </div>
      </div>

      <!-- 空状态（全部模式下无任务） -->
      <div v-else-if="filterMode === 'all'" class="empty">
        <p>暂无任务</p>
        <p class="empty-hint">在上方输入框添加你的第一项任务吧</p>
      </div>

      <!-- 空状态（筛选后无结果） -->
      <div v-else class="empty-filter">
        <p>当前筛选条件下没有任务</p>
      </div>
    </div>

    <!-- ====== 存档记录 ====== -->
    <div class="card archive-card" v-if="archivedTasks.length">
      <div class="archive-header" @click="archiveOpen = !archiveOpen">
        <span class="arrow" :class="{ open: archiveOpen }">▶</span>
        <h3>📂 完成记录 <span class="count">({{ archivedTasks.length }})</span></h3>
        <button class="clear-btn" @click.stop="clearArchived">清空记录</button>
      </div>
      <div v-show="archiveOpen" class="archive-list">
        <div v-for="item in archivedTasks" :key="item.id" class="archive-item">
          <span class="arch-title" :class="{ done: item.done }">{{ item.title }}</span>
          <span v-if="item.time" class="arch-time">{{ formatTime(item.time) }}</span>
          <span class="arch-time">✅ {{ item.archivedAt }}</span>
          <button class="restore-btn" @click="restoreTask(item.id)">恢复</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    const STORAGE_KEY    = 'schedule-tasks'
    const ARCHIVE_KEY    = 'schedule-archived'

    const app = Vue.createApp({
      data() {
        return {
          tasks: [],
          newTitle: '',
          newTime: '',
          editingId: null,
          editTitle: '',
          editTime: '',
          // 筛选
          filterMode: 'all',   // 'all' | 'today' | 'date' | 'nodate'
          filterDate: '',
          // 存档
          archivedTasks: [],
          archiveOpen: true
        }
      },

      computed: {

        undone() {
          return this.tasks.filter(t => !t.done).length
        },

        undoneFiltered() {
          return this.filteredTasks.filter(t => !t.done).length
        },

        filteredTasks() {
          let list = this.tasks
          const mode = this.filterMode
          if (mode === 'today') {
            const today = new Date()
            const y = today.getFullYear()
            const m = String(today.getMonth() + 1).padStart(2, '0')
            const d = String(today.getDate()).padStart(2, '0')
            const todayStr = `${y}-${m}-${d}`
            list = list.filter(t => t.time && t.time.startsWith(todayStr))
          } else if (mode === 'date') {
            if (!this.filterDate) return list
            list = list.filter(t => t.time && t.time.startsWith(this.filterDate))
          } else if (mode === 'nodate') {
            list = list.filter(t => !t.time)
          }
          return list
        }
      },

      created() {
        this.loadData()
      },

      watch: {
        tasks: {
          handler(val) { localStorage.setItem(STORAGE_KEY, JSON.stringify(val)) },
          deep: true
        },
        archivedTasks: {
          handler(val) { localStorage.setItem(ARCHIVE_KEY, JSON.stringify(val)) },
          deep: true
        }
      },

      methods: {

        /* ── 数据持久化 ── */
        loadData() {
          try {
            const s = localStorage.getItem(STORAGE_KEY)
            if (s) this.tasks = JSON.parse(s)
            const a = localStorage.getItem(ARCHIVE_KEY)
            if (a) this.archivedTasks = JSON.parse(a)
          } catch {}
        },

        genId() {
          return Date.now() + '_' + Math.random().toString(36).slice(2, 6)
        },

        /* ── 添加 ── */
        addTask() {
          const title = this.newTitle.trim()
          if (!title) return
          this.tasks.push({
            id: this.genId(),
            title,
            time: this.newTime || '',
            done: false,
            createdAt: Date.now()
          })
          this.newTitle = ''
          this.newTime = ''
        },

        /* ── 删除 ── */
        deleteTask(id) {
          this.tasks = this.tasks.filter(t => t.id !== id)
        },

        /* ── 编辑 ── */
        startEdit(task) {
          this.editingId = task.id
          this.editTitle = task.title
          this.editTime = task.time
        },
        saveEdit() {
          const task = this.tasks.find(t => t.id === this.editingId)
          if (task) {
            task.title = this.editTitle.trim() || task.title
            task.time = this.editTime
          }
          this.cancelEdit()
        },
        cancelEdit() {
          this.editingId = null
          this.editTitle = ''
          this.editTime = ''
        },

        /* ── 完成切换 ── */
        toggleDone(id) {
          const task = this.tasks.find(t => t.id === id)
          if (task) task.done = !task.done
        },

        /* ── 存档（存入记录） ── */
        archiveTask(id) {
          const idx = this.tasks.findIndex(t => t.id === id)
          if (idx === -1) return
          const task = this.tasks.splice(idx, 1)[0]
          const now = new Date()
          const m = now.getMonth() + 1
          const d = now.getDate()
          const h = String(now.getHours()).padStart(2, '0')
          const min = String(now.getMinutes()).padStart(2, '0')
          task.archivedAt = `${m}月${d}日 ${h}:${min}`
          this.archivedTasks.unshift(task)
        },

        /* ── 从存档恢复 ── */
        restoreTask(id) {
          const idx = this.archivedTasks.findIndex(t => t.id === id)
          if (idx === -1) return
          const task = this.archivedTasks.splice(idx, 1)[0]
          delete task.archivedAt
          task.done = false
          this.tasks.unshift(task)
        },

        /* ── 清空存档 ── */
        clearArchived() {
          if (confirm('确定清空所有完成记录吗？')) {
            this.archivedTasks = []
          }
        },

        /* ── 筛选 ── */
        setFilterToday() {
          this.filterMode = 'today'
          this.filterDate = ''
        },
        pickDateFilter() {
          if (this.filterMode === 'date' && this.filterDate) {
            // 如果已经是 date 模式且有值，切回 all
            this.filterMode = 'all'
            this.filterDate = ''
          } else {
            this.filterMode = 'date'
            this.filterDate = new Date().toISOString().slice(0, 10)
          }
        },
        applyFilterDate() {
          // 输入框 change 时确保模式正确
          this.filterMode = 'date'
        },

        /* ── 工具 ── */
        formatTime(timeStr) {
          if (!timeStr) return ''
          const d = new Date(timeStr)
          const m = d.getMonth() + 1
          const day = d.getDate()
          const h = String(d.getHours()).padStart(2, '0')
          const min = String(d.getMinutes()).padStart(2, '0')
          return `${m}月${day}日 ${h}:${min}`
        },

        isOverdue(timeStr) {
          return timeStr && new Date(timeStr) < new Date()
        }
      }
    })

    app.mount('#app')
  </script>
</body>
</html>
